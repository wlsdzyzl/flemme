      name: PointNet2
      in_channel: 3
      out_channel: 46
      num_blocks: 1
      point_num: 4096
      building_block: dense
      # num_neighbors_k: 20
      num_neighbors_k: 32
      num_fps_points: [2048, 1024, 512, 256, 128]
      neighbor_radius: [0.1, 0.2, 0.4, 0.6, 0.8]
